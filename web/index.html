<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lunchmeny</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🍽%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf9f6;
      --card-bg: #ffffff;
      --accent: #2c5f2d;
      --accent-light: #e8f0e8;
      --text: #2d2d2d;
      --text-secondary: #636363;
      --muted: #9a9a9a;
      --border: #ebebeb;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
      --radius: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .hero {
      background: linear-gradient(135deg, #2c5f2d 0%, #3a7d44 60%, #4a9956 100%);
      color: white;
      padding: 4rem 1.5rem 3.5rem;
      text-align: center;
    }

    .hero h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 2.8rem;
      font-weight: 400;
      letter-spacing: 0.01em;
      margin-bottom: 0.5rem;
    }

    .hero .tagline {
      font-size: 1rem;
      opacity: 0.85;
      font-weight: 400;
      max-width: 320px;
      margin: 0 auto;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 2rem 1rem 3rem;
      flex: 1;
      width: 100%;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.75rem;
      padding-left: 0.25rem;
    }

    .region-card {
      display: flex;
      align-items: center;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      margin-bottom: 0.75rem;
      padding: 1.25rem 1.25rem;
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      transition: box-shadow 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
    }

    .region-card:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .region-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
      margin-right: 1rem;
    }

    .region-info {
      flex: 1;
      min-width: 0;
    }

    .region-info h2 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.25rem;
      font-weight: 400;
      line-height: 1.3;
    }

    .region-info p {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 0.15rem;
    }

    .region-count {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      background: var(--accent-light);
      padding: 0.15rem 0.5rem;
      border-radius: 100px;
      margin-top: 0.4rem;
      display: inline-block;
    }

    .region-arrow {
      font-size: 1.3rem;
      color: var(--muted);
      margin-left: 0.75rem;
      flex-shrink: 0;
      transition: transform 0.15s ease;
    }

    .region-card:hover .region-arrow {
      transform: translateX(3px);
      color: var(--accent);
    }

    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      padding: 2rem 1rem 2rem;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }

    @media (max-width: 600px) {
      .hero { padding: 3rem 1rem 2.5rem; }
      .hero h1 { font-size: 2.2rem; }
      .container { padding: 1.5rem 0.75rem 2rem; }
      .region-icon { width: 42px; height: 42px; font-size: 1.2rem; }
      .region-info h2 { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Lunchmeny</h1>
    <div class="tagline">Veckans lunch samlad på ett ställe</div>
  </div>

  <div class="container">
    <div class="section-label">Välj område</div>

    <a class="region-card" href="torslanda/">
      <div class="region-icon">T</div>
      <div class="region-info">
        <h2>Torslanda & Amhult</h2>
        <p>Golfkrogen, Bryggan, Tsuki Hana m.fl.</p>
        <span class="region-count">8 restauranger</span>
      </div>
      <span class="region-arrow">&rsaquo;</span>
    </a>

    <a class="region-card" href="platinan/">
      <div class="region-icon">P</div>
      <div class="region-info">
        <h2>Platinan</h2>
        <p>Björkmans Skafferi, Pagoden, Poppels m.fl.</p>
        <span class="region-count">4 restauranger</span>
      </div>
      <span class="region-arrow">&rsaquo;</span>
    </a>
  </div>

  <div class="footer">Uppdateras automatiskt varje vardag</div>
</body>
</html>
